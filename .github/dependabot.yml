version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope
    groups:
      next:
        patterns: ["next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      drizzle:
        patterns: ["drizzle-*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(ci)

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    commit-message:
      prefix: chore(docker)
