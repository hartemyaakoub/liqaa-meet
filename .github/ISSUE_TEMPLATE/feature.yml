name: ✨ Feature request
description: Suggest a new capability or improvement.
title: "feat: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Substantial features go through the [LIQAA RFC process](https://github.com/hartemyaakoub/liqaa-rfcs) before any code lands. For small features and improvements, this template is enough.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: Describe the pain. "X is hard to do" beats "We should add X".
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the feature look like to a user?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why not those?

  - type: dropdown
    id: scope
    attributes:
      label: Is this a substantial change?
      description: |
        Substantial = new API endpoint, breaking change, new external integration, or anything that would affect a published roadmap. Substantial features need an RFC.
      options:
        - 'No — small UX tweak / copy / dependency bump'
        - 'Yes — needs an RFC first'
        - "Not sure — let's discuss"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I'd be willing to contribute the implementation
          required: false
