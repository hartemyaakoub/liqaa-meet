name: Feature request
description: Suggest a new feature or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. For substantial changes (new APIs, architectural shifts), please open an RFC instead: https://github.com/hartemyaakoub/liqaa-rfcs

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case before the solution. Who is affected, how often, how much pain.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: One concrete approach. We will iterate together.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why didn't they work?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (one component, no new deps)
        - Medium (multiple components, possibly new dep)
        - Large (architectural change — needs RFC)
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I would like to implement this myself
          required: false
        - label: I can help with testing / review
          required: false
