name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Filling this carefully helps us reproduce and fix it fast.

        For security issues, please email security@liqaa.io instead of opening a public issue.

  - type: input
    id: version
    attributes:
      label: LIQAA Meet version
      description: From `package.json` or the live demo footer.
      placeholder: "v0.4.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: How are you running LIQAA Meet?
      options:
        - Live demo (meet.liqaa.io)
        - Self-hosted (Docker)
        - Self-hosted (npm run dev)
        - Self-hosted (other)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Edge
        - Brave
        - Firefox
        - Safari
        - Other (specify in repro steps)
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: List the exact steps. Smaller is better.
      placeholder: |
        1. Open meet.liqaa.io
        2. Click "Start a meeting"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Console errors, screenshots, network tab — paste anything relevant.
    validations:
      required: true

  - type: checkboxes
    id: search
    attributes:
      label: Searched first?
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: I checked the troubleshooting section in SELF_HOSTING.md
          required: false
