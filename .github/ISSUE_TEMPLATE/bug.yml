name: 🐛 Bug report
description: Something is broken or behaves wrong.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in everything you can — vague reports take much longer to resolve.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Tell us what you observed. Screenshots and screencasts welcome.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Step-by-step. If we can't reproduce it, we can't fix it.
      placeholder: |
        1. docker compose up -d
        2. open http://localhost:3000
        3. click "New room"
        4. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `git rev-parse HEAD` or the release tag.
      placeholder: v0.3.0
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: Deployment mode
      options:
        - Docker Compose (self-hosted)
        - Vercel + LIQAA Cloud
        - Local dev (npm run dev)
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: Chrome 130 on macOS 14, Firefox 130 on Ubuntu 22.04, …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Console output, server logs, network errors. Strip secrets.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest release
          required: false
