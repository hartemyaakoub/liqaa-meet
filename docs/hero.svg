<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">LIQAA Meet — open-source video meetings</title>
  <desc id="hero-desc">Mockup of the LIQAA Meet meeting room: 4 participant tiles, captions panel on the right, mute / camera / share controls below.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0d18"/>
    </linearGradient>
    <linearGradient id="tileA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="tileB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tileC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="tileD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e293b"/>
    </pattern>
  </defs>

  <!-- chrome -->
  <rect width="1200" height="640" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="640" rx="20" fill="url(#dots)" opacity="0.6"/>

  <!-- top bar -->
  <g transform="translate(0,0)">
    <rect width="1200" height="56" fill="#0a0d18" opacity="0.95"/>
    <line x1="0" y1="56" x2="1200" y2="56" stroke="#1e293b"/>
    <circle cx="32" cy="28" r="6" fill="#10b981">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="33" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#fff">Weekly product sync</text>
    <text x="220" y="33" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">abc1-d3f4-h5km</text>
    <text x="980" y="33" font-family="ui-monospace, monospace" font-size="12" fill="#94a3b8">4 participants</text>
    <rect x="1100" y="14" width="78" height="28" rx="8" fill="#dc2626"/>
    <text x="1139" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="#fff">Leave</text>
  </g>

  <!-- stage / tiles -->
  <g transform="translate(20, 76)">
    <!-- Tile 1 (large, speaker) -->
    <g transform="translate(0, 0)">
      <rect width="540" height="220" rx="14" fill="url(#tileA)"/>
      <rect width="540" height="220" rx="14" fill="none" stroke="#10b981" stroke-width="3"/>
      <circle cx="270" cy="100" r="44" fill="#fff" opacity="0.18"/>
      <text x="270" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="32" fill="#fff">YH</text>
      <rect x="12" y="186" width="190" height="22" rx="6" fill="rgba(0,0,0,0.55)"/>
      <text x="22" y="202" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#fff">Yaakoub HARTEM (you)</text>
    </g>
    <!-- Tile 2 -->
    <g transform="translate(560, 0)">
      <rect width="260" height="220" rx="14" fill="url(#tileB)"/>
      <circle cx="130" cy="92" r="36" fill="#fff" opacity="0.18"/>
      <text x="130" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="26" fill="#fff">AS</text>
      <rect x="12" y="186" width="120" height="22" rx="6" fill="rgba(0,0,0,0.55)"/>
      <text x="22" y="202" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#fff">Amal Saidi</text>
      <text x="225" y="203" font-family="system-ui, sans-serif" font-size="13" fill="#fff" opacity="0.85">🔇</text>
    </g>
  </g>
  <g transform="translate(20, 304)">
    <!-- Tile 3 -->
    <g transform="translate(0, 0)">
      <rect width="260" height="180" rx="14" fill="url(#tileC)"/>
      <circle cx="130" cy="76" r="32" fill="#fff" opacity="0.18"/>
      <text x="130" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="#fff">RB</text>
      <rect x="12" y="146" width="100" height="22" rx="6" fill="rgba(0,0,0,0.55)"/>
      <text x="22" y="162" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#fff">Rania B.</text>
    </g>
    <!-- Tile 4 -->
    <g transform="translate(280, 0)">
      <rect width="260" height="180" rx="14" fill="url(#tileD)"/>
      <circle cx="130" cy="76" r="32" fill="#fff" opacity="0.18"/>
      <text x="130" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="#fff">MK</text>
      <rect x="12" y="146" width="120" height="22" rx="6" fill="rgba(0,0,0,0.55)"/>
      <text x="22" y="162" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#fff">Mehdi K.</text>
      <text x="225" y="163" font-family="system-ui, sans-serif" font-size="13" fill="#fff" opacity="0.85">🖥</text>
    </g>
    <!-- Empty tile placeholder -->
    <g transform="translate(560, 0)">
      <rect width="260" height="180" rx="14" fill="#1e293b" stroke="#334155" stroke-dasharray="4 4"/>
      <text x="130" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">+ invite via link</text>
    </g>
  </g>

  <!-- side panel: captions -->
  <g transform="translate(840, 76)">
    <rect width="340" height="408" rx="14" fill="#0d1320" stroke="#1e293b"/>
    <line x1="0" y1="44" x2="340" y2="44" stroke="#1e293b"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="#fff">Captions</text>
    <text x="320" y="28" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#10b981">● in your browser</text>

    <g transform="translate(20, 64)" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="0" y="0" font-weight="700" font-size="11" fill="#60a5fa">Yaakoub HARTEM</text>
      <text x="0" y="22">So we&#8217;re shipping the WebGPU build next sprint, &#8230;</text>
      <text x="0" y="40">it should drop transcription latency to 90 ms.</text>

      <text x="0" y="80" font-weight="700" font-size="11" fill="#94a3b8">Amal Saidi</text>
      <text x="0" y="102">Nice. Do we still need server-side ASR for fallback?</text>

      <text x="0" y="138" font-weight="700" font-size="11" fill="#94a3b8">Rania B.</text>
      <text x="0" y="160">Only on Safari without SharedArrayBuffer support.</text>

      <text x="0" y="200" font-weight="700" font-size="11" fill="#60a5fa">Yaakoub HARTEM</text>
      <text x="0" y="222">Right — and we add a feature flag so self-hosters</text>
      <text x="0" y="240">can disable the cloud fallback if they prefer.</text>

      <text x="0" y="276" font-weight="700" font-size="11" fill="#94a3b8">Mehdi K.</text>
      <text x="0" y="298">Sharing my screen — quick mock of the panel.</text>
    </g>

    <line x1="0" y1="368" x2="340" y2="368" stroke="#1e293b"/>
    <text x="20" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Audio never leaves your device.</text>
  </g>

  <!-- footer / control bar -->
  <g transform="translate(0, 504)">
    <rect width="1200" height="86" fill="#0a0d18"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#1e293b"/>

    <g transform="translate(440, 22)">
      <rect width="100" height="42" rx="10" fill="#1e293b"/>
      <text x="50" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#fff">🎤 Mute</text>
    </g>
    <g transform="translate(548, 22)">
      <rect width="120" height="42" rx="10" fill="#1e293b"/>
      <text x="60" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#fff">📷 Camera off</text>
    </g>
    <g transform="translate(676, 22)">
      <rect width="140" height="42" rx="10" fill="#1d4ed8"/>
      <text x="70" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#fff">🖥 Share screen</text>
    </g>
  </g>

  <!-- Brand corner -->
  <g transform="translate(1080, 588)" opacity="0.7">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="10" fill="#475569">github.com/hartemyaakoub/liqaa-meet</text>
  </g>
</svg>
